# Publish to PyPI when a GitHub release is created
# 1. Create a PyPI API token: https://pypi.org/manage/account/token/
# 2. Add it under environment "pypi": Settings → Environments → pypi → Environment secrets → PYPI_API_TOKEN

name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version from release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          CURRENT=$(grep -E '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "${VERSION}" != "${CURRENT}" ]; then
            echo "Tag version ${VERSION} does not match pyproject.toml version ${CURRENT}"
            exit 1
          fi
          echo "Building version ${VERSION}"
          grep '^version = ' pyproject.toml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
